# Helicorder Plotter Configuration

# FDSN dataselect + station service base URL
base_url: "http://127.0.0.1:18081"

# FDSN event service URL (for earthquake annotations)
event_url: "http://service.iris.edu/fdsnws/event/1/query"

# Output directory for generated plots and HTML
output_dir: "output"

# Number of parallel workers for plotting
max_workers: 8

# Minimum earthquake magnitude to annotate
min_magnitude: 5.5

# Hours of waveform data to plot
hours: 24

# HTTP request timeout in seconds
timeout: 30

# Stations to plot
# Format: "Network.Station": "Channel" or "Channel.Location"
